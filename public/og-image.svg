<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F7F3EC"/>

  <!-- Subtle grain texture -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply" result="grain"/>
  </filter>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.03"/>

  <!-- Left accent line -->
  <rect x="80" y="200" width="48" height="3" rx="1.5" fill="#BF4210"/>

  <!-- Eyebrow text -->
  <text x="144" y="204" fill="#BF4210" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="14" font-weight="500" letter-spacing="3">
    AI EDUCATOR · FOUNDER · DEVELOPMENT PROFESSIONAL
  </text>

  <!-- Main headline -->
  <text x="80" fill="#1A1612" font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif" font-size="72" font-weight="600" letter-spacing="-1">
    <tspan x="80" y="290">The next billion</tspan>
    <tspan x="80" y="370" fill="#BF4210" font-style="italic">deserve AI too.</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="430" fill="#6B6259" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="20" font-weight="300">
    Five platforms · Two continents · 35M+ monthly reach
  </text>

  <!-- Name -->
  <text x="80" y="530" fill="#1A1612" font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif" font-size="32" font-weight="600" letter-spacing="-0.5">
    Qaisar Roonjha
  </text>

  <!-- URL -->
  <text x="80" y="565" fill="#B5A99A" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="16" font-weight="400" letter-spacing="1">
    roonjha.com
  </text>

  <!-- Right side decorative element — vertical rust bar -->
  <rect x="1100" y="0" width="6" height="630" fill="#BF4210" opacity="0.15"/>
  <rect x="1112" y="0" width="2" height="630" fill="#BF4210" opacity="0.08"/>

  <!-- Bottom gold accent line -->
  <rect x="80" y="590" width="120" height="2" rx="1" fill="#C8A84E" opacity="0.5"/>
</svg>
